<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .font-serif { font-family: 'Fraunces', serif; }
        .font-sans { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#e5e2e1",
                    "inverse-on-surface": "#f1f1ef",
                    "surface-variant": "#e2e3e1",
                    "primary-fixed": "#a4f4bb",
                    "surface-dim": "#dadad8",
                    "primary-fixed-dim": "#88d8a1",
                    "on-error": "#ffffff",
                    "surface-container-highest": "#e2e3e1",
                    "on-tertiary-container": "#dfdddc",
                    "on-tertiary-fixed": "#1c1b1b",
                    "surface-container-low": "#f4f4f2",
                    "surface-container-high": "#e8e8e6",
                    "secondary": "#885200",
                    "on-error-container": "#93000a",
                    "secondary-fixed": "#ffdcbb",
                    "secondary-fixed-dim": "#ffb869",
                    "error-container": "#ffdad6",
                    "surface-container": "#eeeeec",
                    "secondary-container": "#fdad4e",
                    "on-primary-container": "#9fefb6",
                    "on-background": "#1a1c1b",
                    "surface-tint": "#196c3f",
                    "on-surface": "#1a1c1b",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#3f4941",
                    "on-primary-fixed": "#00210e",
                    "primary-container": "#1d6f42",
                    "outline-variant": "#bfc9be",
                    "primary": "#00552e",
                    "on-primary": "#ffffff",
                    "on-secondary-container": "#704200",
                    "inverse-primary": "#88d8a1",
                    "surface-bright": "#f9f9f7",
                    "on-secondary-fixed-variant": "#673d00",
                    "tertiary-fixed-dim": "#c8c6c5",
                    "tertiary-container": "#626161",
                    "inverse-surface": "#2f3130",
                    "on-primary-fixed-variant": "#00522c",
                    "on-tertiary-fixed-variant": "#474746",
                    "on-secondary": "#ffffff",
                    "background": "#f9f9f7",
                    "tertiary": "#4a4949",
                    "outline": "#6f7a70",
                    "on-tertiary": "#ffffff",
                    "surface": "#f9f9f7",
                    "on-secondary-fixed": "#2b1700",
                    "error": "#ba1a1a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Fraunces"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-sans selection:bg-primary-fixed-dim">
<!-- Supressing Navigation Shell for Transactional Login Flow -->
<main class="min-h-screen flex flex-col items-center justify-center px-6 py-12 max-w-md mx-auto">
<!-- Brand Identity -->
<header class="mb-12 text-center">
<img alt="Niyam Logo" class="h-16 w-auto mx-auto mb-8" data-alt="minimalist logo featuring elegant circular geometry and organic green leaf shapes on a clean ivory background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB0Lh89jISy_qorEEvUK5lNA1DZGz63rPsbeJeibcLZZzd_y-_tnW4gQ7PE9zcNQxgUm90uIkmHd451YmXt-ndNkJEAf63B9NHTKiHIbhICoNCZqEzeCHjJwQ_t33Rj5EfNmxkERYpOGKNoDAjEnul4jr5qZ2TQE7IEg1SznIg1yrdOwHPyN3ILdjZiCZeWJdza91dMCxjIRQe5uxYltoJmKrP7y4TRnTkUdaV_2t1sU3rCyyLCuNEUAbC1FKomoV9Sd687b7D0Gt8F"/>
<h1 class="font-serif text-4xl font-bold tracking-tight text-on-surface">Create your account</h1>
<p class="mt-3 text-on-surface-variant font-medium">Begin your journey to conscious well-being.</p>
</header>
<!-- Registration Form -->
<form class="w-full space-y-5">
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="name">Full Name</label>
<div class="relative">
<input class="w-full px-5 py-4 bg-surface-container rounded-[12px] border-none focus:ring-2 focus:ring-primary/30 transition-all placeholder:text-on-surface-variant/40" id="name" placeholder="Vaidya Sharma" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative">
<input class="w-full px-5 py-4 bg-surface-container rounded-[12px] border-none focus:ring-2 focus:ring-primary/30 transition-all placeholder:text-on-surface-variant/40" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full px-5 py-4 bg-surface-container rounded-[12px] border-none focus:ring-2 focus:ring-primary/30 transition-all placeholder:text-on-surface-variant/40" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full mt-4 py-4 bg-gradient-to-b from-primary to-primary-container text-on-primary font-bold rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                Create Account
            </button>
</form>
<!-- Social Divider -->
<div class="w-full flex items-center my-10 gap-4">
<div class="h-[0.5px] flex-grow bg-outline-variant/30"></div>
<span class="text-xs font-bold uppercase tracking-tighter text-on-surface-variant/60">Or sign up with</span>
<div class="h-[0.5px] flex-grow bg-outline-variant/30"></div>
</div>
<!-- Social Buttons -->
<div class="w-full grid grid-cols-2 gap-4 mb-10">
<button class="flex items-center justify-center gap-3 py-3.5 bg-surface-container-low rounded-lg hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3.5 bg-surface-container-low rounded-lg hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05 1.43-3.23 1.43-1.18 0-2.14-.44-2.88-1.33-.74.89-1.74 1.33-3.03 1.33-1.13 0-2.18-.46-3.16-1.37-2.31-2.11-3.46-5.18-3.46-9.2 0-2.42.59-4.32 1.77-5.7 1.18-1.38 2.76-2.07 4.74-2.07.91 0 1.93.3 3.03.9 1.1-.6 2.05-.9 2.83-.9 1.83 0 3.24.63 4.25 1.9-2.03 1.22-3.05 2.85-3.05 4.88 0 1.66.62 3.03 1.85 4.12.56.5 1.25.9 2.07 1.21-.24.7-.72 1.4-1.45 2.11zM12.03 7.25c-.24-2.13 1.13-3.9 3.07-4.25.32 2.21-1.31 4.17-3.07 4.25z"></path>
</svg>
<span class="text-sm font-semibold text-on-surface">Apple</span>
</button>
</div>
<!-- Footer Links -->
<footer class="mt-auto text-center space-y-8">
<p class="text-sm text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:underline underline-offset-4 ml-1 transition-all" href="#">Login</a>
</p>
<div class="px-4">
<p class="text-[11px] leading-relaxed text-on-surface-variant/40 font-medium">
                    By creating an account, you agree to our 
                    <a class="underline" href="#">Terms of Service</a> and 
                    <a class="underline" href="#">Privacy Policy</a>. Niyam uses ritual-based data to personalize your healing journey.
                </p>
</div>
</footer>
</main>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-secondary/5 rounded-full blur-3xl"></div>
</div>
</body></html>

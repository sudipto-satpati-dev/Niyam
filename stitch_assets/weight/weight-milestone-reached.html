<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.editorial-shadow {
    box-shadow: 0 24px 48px -12px rgba(26, 28, 27, 0.08)
    }
.bg-grain {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuC6bSOd91uB8Us8DVRtovyRA6r5u9vbpSFkH21LZQ5OFshGdIUx7mXDp8mf4MrscXDnv1FGqSyfDZdFXW0dZYEI7YpHN7lrPFEruXMree7DQ7dK4VoVyuHOQ_qxII0GiltEQEytisvwlo-iUKhZyq1jObw6gQdcs9N5s5idqlqvNSlYO_h6y_6DJpH-AwGxptaC0yEDJ3KGbbLoJljoDlYcpLmQcfcdpDnRciDC7cZy4bELJ5HUlv7IrkqzmVAjWz4Tpc_zapzDGAZg)

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body antialiased">
<!-- Milestone Celebration Modal -->
<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 lg:p-8 bg-on-surface/10 backdrop-blur-xl">
<div class="relative w-full max-w-lg bg-surface-container-lowest rounded-[2rem] overflow-hidden editorial-shadow flex flex-col items-center text-center">
<!-- Confetti & Star Header Section -->
<div class="relative w-full h-64 flex items-center justify-center overflow-hidden">
<!-- Decorative Abstract Background -->
<div class="absolute inset-0 bg-gradient-to-b from-primary-fixed/30 to-transparent"></div>
<!-- Confetti Illustration (Conceptual representation with circles and shapes) -->
<div class="absolute inset-0 opacity-40">
<div class="absolute top-10 left-10 w-4 h-4 rounded-full bg-secondary-fixed-dim rotate-12"></div>
<div class="absolute top-20 right-20 w-3 h-3 bg-primary-container rotate-45"></div>
<div class="absolute bottom-10 left-1/4 w-5 h-2 bg-secondary rotate-[15deg] rounded-full"></div>
<div class="absolute top-1/2 right-1/4 w-2 h-6 bg-primary-fixed rotate-[60deg] rounded-full"></div>
<div class="absolute top-1/4 left-1/2 w-3 h-3 rounded-full bg-error/20"></div>
</div>
<!-- Central Star Icon -->
<div class="relative z-10 flex items-center justify-center w-32 h-32 rounded-full bg-surface-container-lowest editorial-shadow">
<span class="material-symbols-outlined text-6xl text-secondary" style="font-variation-settings: 'FILL' 1;">
                        stars
                    </span>
</div>
</div>
<!-- Content Canvas -->
<div class="px-8 pb-10 pt-2 w-full flex flex-col items-center">
<!-- Header Text -->
<h1 class="font-headline text-4xl font-bold text-on-surface tracking-tight leading-tight mb-2">
                    Milestone reached!
                </h1>
<p class="font-headline italic text-2xl text-primary-container mb-6">
                    First 2 kg lost!
                </p>
<!-- Data Visualization: Metrics Pill -->
<div class="inline-flex items-center gap-3 px-6 py-3 bg-surface-container-low rounded-full mb-8">
<span class="font-body font-semibold text-lg text-on-surface-variant">74 kg</span>
<span class="material-symbols-outlined text-outline">arrow_forward</span>
<span class="font-body font-bold text-xl text-primary">72 kg</span>
<div class="w-px h-4 bg-outline-variant mx-1"></div>
<span class="font-label text-sm uppercase tracking-widest text-on-surface-variant">Week 3</span>
</div>
<!-- Signature Component: The Ritual Tracker (Progress Strip) -->
<div class="w-full mb-12">
<div class="flex justify-between items-center relative px-2">
<!-- Connecting Line -->
<div class="absolute top-1/2 left-0 w-full h-[2px] bg-surface-container-high -translate-y-1/2 z-0"></div>
<div class="absolute top-1/2 left-0 w-2/5 h-[2px] bg-secondary -translate-y-1/2 z-0"></div>
<!-- 5 Circles for Progress -->
<!-- Completed Circle 1 -->
<div class="relative z-10 w-10 h-10 rounded-full bg-secondary flex items-center justify-center text-white border-4 border-surface-container-lowest">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
<!-- Completed Circle 2 (Active Milestone) -->
<div class="relative z-10 w-10 h-10 rounded-full bg-secondary flex items-center justify-center text-white border-4 border-surface-container-lowest scale-125 shadow-lg">
<span class="material-symbols-outlined text-sm font-bold">star</span>
</div>
<!-- Pending Circle 3 -->
<div class="relative z-10 w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant border-4 border-surface-container-lowest">
<span class="text-[10px] font-bold">3</span>
</div>
<!-- Pending Circle 4 -->
<div class="relative z-10 w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant border-4 border-surface-container-lowest">
<span class="text-[10px] font-bold">4</span>
</div>
<!-- Pending Circle 5 -->
<div class="relative z-10 w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant border-4 border-surface-container-lowest">
<span class="text-[10px] font-bold">5</span>
</div>
</div>
<div class="flex justify-between mt-4 px-1">
<p class="font-label text-[10px] uppercase tracking-tighter text-on-surface-variant opacity-60">Kickoff</p>
<p class="font-label text-[10px] uppercase tracking-tighter text-secondary font-bold">Current</p>
<p class="font-label text-[10px] uppercase tracking-tighter text-on-surface-variant opacity-60">Goal</p>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full space-y-3">
<!-- Primary CTA -->
<button class="w-full py-4 px-6 bg-gradient-to-b from-primary to-primary-container text-white font-body font-bold text-lg rounded-xl flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all editorial-shadow">
<span class="material-symbols-outlined text-xl">share</span>
                        Share progress
                    </button>
<!-- Secondary CTA -->
<button class="w-full py-4 px-6 bg-surface-container-high text-on-primary-fixed-variant font-body font-semibold text-lg rounded-xl hover:bg-surface-container-highest active:scale-[0.98] transition-all">
                        Continue
                    </button>
</div>
<p class="mt-8 font-label text-xs text-outline italic">
                    "Small steps lead to great distances."
                </p>
</div>
</div>
</div>
<!-- Background Content (Simulated Dashboard) -->
<div class="max-w-screen-xl mx-auto px-6 py-24 opacity-20 pointer-events-none">
<header class="mb-12">
<h2 class="font-headline text-5xl font-bold mb-4">Good morning, Ravi</h2>
<div class="h-4 w-48 bg-primary-container rounded-full mb-2"></div>
<div class="h-4 w-32 bg-outline-variant rounded-full"></div>
</header>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="h-64 bg-surface-container-low rounded-3xl"></div>
<div class="h-64 bg-surface-container-low rounded-3xl col-span-2"></div>
<div class="h-96 bg-surface-container-low rounded-3xl col-span-2"></div>
<div class="h-96 bg-surface-container-low rounded-3xl"></div>
</div>
</div>
<!-- Top Bar Component -->
<nav class="fixed top-0 w-full z-50 bg-[#F9F9F7]/80 backdrop-blur-md">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#1D6F42]" data-icon="monitor_weight">monitor_weight</span>
<span class="font-['Fraunces'] font-bold text-2xl tracking-wide text-on-surface">Weight Tracker</span>
</div>
<button class="text-[#1D6F42] font-semibold text-sm hover:bg-stone-200/50 px-4 py-2 rounded-lg transition-colors active:scale-95">
                Log
            </button>
</div>
</nav>
<!-- Navigation Shell Placeholder -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#F9F9F7] z-50 rounded-t-2xl shadow-[0_-4px_24px_rgba(26,28,27,0.04)]">
<div class="flex flex-col items-center justify-center text-stone-500 px-3 py-1.5">
<span class="material-symbols-outlined" data-icon="book_2">book_2</span>
<span class="font-['Manrope'] text-[11px] font-medium uppercase tracking-wider mt-1">Journal</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-500 px-3 py-1.5">
<span class="material-symbols-outlined" data-icon="restaurant">restaurant</span>
<span class="font-['Manrope'] text-[11px] font-medium uppercase tracking-wider mt-1">Meals</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-500 px-3 py-1.5">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-['Manrope'] text-[11px] font-medium uppercase tracking-wider mt-1">Tracker</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#1D6F42] text-white rounded-xl px-4 py-2 shadow-lg">
<span class="material-symbols-outlined" data-icon="scale" style="font-variation-settings: 'FILL' 1;">scale</span>
<span class="font-['Manrope'] text-[11px] font-medium uppercase tracking-wider mt-1">Weight</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-500 px-3 py-1.5">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
<span class="font-['Manrope'] text-[11px] font-medium uppercase tracking-wider mt-1">Habits</span>
</div>
</nav>
</body></html>
